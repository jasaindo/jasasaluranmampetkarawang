name: Scheduled Astro Build

on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Mengatasi peringatan Node.js 20

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Update ke versi terbaru

      - name: Install pnpm
        uses: pnpm/action-setup@v4 # Update ke v4
        with:
          version: 10 # Menggunakan pnpm terbaru sesuai standar Anda

      - name: Install dependencies
        # Kita hapus pengecekan lockfile agar robot tetap jalan meskipun lockfile tertinggal
        run: pnpm install --no-frozen-lockfile

      - name: Build Astro
        run: pnpm run build

      - name: Trigger Cloudflare Deploy
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "Scheduled build: $(date)"
          git push origin main