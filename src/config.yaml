site:
  name: 'Jasa Saluran Mampet Karawang'
  site: 'https://jasasaluranmampetkarawang.my.id'
  base: '/'
  trailingSlash: true # DIUBAH: Harus TRUE agar sinkron dengan astro.config.mjs (always)

metadata:
  title:
    default: 'Jasa Saluran Mampet Karawang - Tukang No 1 di karawang'
    template: '%s — Jasa Saluran Mampet Karawang'
  description: 'Solusi ahli untuk saluran mampet, sedot tinja, dan perbaikan pipa di wilayah Karawang dan sekitarnya.'
  robots:
    index: true # DISARANKAN: Set true agar website terindeks Google (Karawang SEO)
    follow: true

i18n:
  language: id
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6
    isRelatedPostsEnabled: true
    relatedPostsCount: 4
    post:
      isEnabled: true
      route: '' # DIUBAH: Dikosongkan agar URL post langsung di root (Tanpa /blog/)
    list:
      isEnabled: true
      route: 'blog' # Halaman daftar artikel tetap bisa diakses di /blog/
    category:
      isEnabled: true
    tag:
      isEnabled: true

analytics:
  vendors:
    googleAnalytics:
      id: null